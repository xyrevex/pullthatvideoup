<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>pull that video up</title>
<style>
body{margin:0;background:#0e0e0e;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
canvas{background:#000;max-height:70vh}
.controls{margin-top:14px;display:flex;gap:10px}
progress{width:300px;height:10px;margin-top:10px}
video{display:none}
button,input,select{background:#1c1c1c;color:#fff;border:0;padding:8px 12px}
button:disabled{opacity:.5}
</style>
</head>
<body>

<canvas id="stage"></canvas>

<div class="controls">
<select id="ratio">
<option value="9:16" selected>9:16</option>
<option value="16:9">16:9</option>
<option value="4:3">4:3</option>
<option value="1:1">1:1</option>
</select>

<input type="file" id="upload" accept="video/*">

<button id="download" disabled>download mp4</button>

</div>

<progress id="bar" value="0" max="1"></progress>

<video id="intro" playsinline preload="auto" crossorigin="anonymous"></video> <video id="clip" playsinline preload="auto"></video>

<script>

const canvas=document.getElementById("stage")
const ctx=canvas.getContext("2d")

const intro=document.getElementById("intro")
const clip=document.getElementById("clip")

const upload=document.getElementById("upload")
const download=document.getElementById("download")
const ratio=document.getElementById("ratio")
const bar=document.getElementById("bar")

intro.src="https://raw.githubusercontent.com/xyrevex/pullthatvideoup/main/sourcevid.mp4"

let fade=0
let fading=false
let done=false

let recorder
let pieces=[]
let blob=null

let audioCtx
let dest
let introNode
let clipNode

function setRatio(r){
let w=1080
let h=1920
if(r==="16:9"){w=1920;h=1080}
if(r==="4:3"){w=1440;h=1080}
if(r==="1:1"){w=1080;h=1080}
canvas.width=w
canvas.height=h
}

setRatio("9:16")

ratio.onchange=()=>setRatio(ratio.value)

function startCapture(stream){
pieces=[]
let type="video/mp4"
if(!MediaRecorder.isTypeSupported(type)) type="video/webm"

recorder=new MediaRecorder(stream,{mimeType:type})

recorder.ondataavailable=e=>{
if(e.data.size>0) pieces.push(e.data)
}

recorder.onstop=()=>{
blob=new Blob(pieces,{type:recorder.mimeType})
done=true
download.disabled=false
download.textContent="download mp4"
}

recorder.start()

download.disabled=true
download.textContent="rendering"
}

upload.onchange=e=>{

const file=e.target.files[0]
if(!file) return

clip.src=URL.createObjectURL(file)

fade=0
fading=false
done=false

intro.currentTime=0
clip.currentTime=0

if(!audioCtx){

audioCtx=new AudioContext()

dest=audioCtx.createMediaStreamDestination()

introNode=audioCtx.createMediaElementSource(intro)
clipNode=audioCtx.createMediaElementSource(clip)

introNode.connect(dest)
clipNode.connect(dest)

}

const canvasStream=canvas.captureStream()

const merged=new MediaStream([
...canvasStream.getVideoTracks(),
...dest.stream.getAudioTracks()
])

startCapture(merged)

intro.play()

loop()

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(!fading){
ctx.drawImage(intro,0,0,canvas.width,canvas.height)
}

if(intro.currentTime>=1.5 && !fading){
clip.play()
fading=true
}

if(fading){

fade+=0.02
if(fade>1) fade=1

if(fade<1){
ctx.drawImage(intro,0,0,canvas.width,canvas.height)
ctx.globalAlpha=fade
ctx.drawImage(clip,0,0,canvas.width,canvas.height)
ctx.globalAlpha=1
}else{
ctx.drawImage(clip,0,0,canvas.width,canvas.height)
}

clip.volume=fade
bar.value=fade

}

if(clip.ended){
recorder.stop()
return
}

requestAnimationFrame(loop)

}

download.onclick=()=>{

if(!done || !blob) return

const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="render.mp4"
a.click()

}

</script>

</body>
</html>
