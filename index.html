<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>video</title>

<style>
body{
background:#0f0f0f;
font-family:sans-serif;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
height:100vh;
margin:0;
color:white
}

#wrap{
display:flex;
flex-direction:column;
align-items:center
}

canvas{
background:black;
max-height:80vh
}

select,input,button{
margin-top:14px
}

#save{
display:none
}
</style>

</head>

<body>

<div id="wrap">

<canvas id="screen"></canvas>

<select id="ratio">
<option value="9:16" selected>9:16</option>
<option value="16:9">16:9</option>
<option value="4:3">4:3</option>
<option value="1:1">1:1</option>
</select>

<input type="file" id="filepick" accept="video/*">
<button id="save">download</button>

</div>

<video id="base" playsinline preload="auto"></video> <video id="overlay" playsinline></video>

<script>

const canvas = document.getElementById("screen")
const ctx = canvas.getContext("2d")
const base = document.getElementById("base")
const overlay = document.getElementById("overlay")
const pick = document.getElementById("filepick")
const save = document.getElementById("save")
const ratio = document.getElementById("ratio")

base.src = "https://raw.githubusercontent.com/xyrevex/pullthatvideoup/main/sourcevid.mp4"

let fade = 0
let swap = false

function setRatio(r){

let w = 1080
let h = 1920

if(r==="16:9"){w=1920;h=1080}
if(r==="4:3"){w=1440;h=1080}
if(r==="1:1"){w=1080;h=1080}

canvas.width = w
canvas.height = h

}

setRatio("9:16")

ratio.onchange = ()=>{
setRatio(ratio.value)
}

let stream = canvas.captureStream()
let recorder = new MediaRecorder(stream,{mimeType:"video/webm"})
let parts = []

recorder.ondataavailable = e=>{
if(e.data.size>0) parts.push(e.data)
}

recorder.onstop = ()=>{
const file = new Blob(parts,{type:"video/webm"})
const url = URL.createObjectURL(file)
save.style.display="inline"
save.onclick=()=>{
const a=document.createElement("a")
a.href=url
a.download="video.webm"
a.click()
}
}

pick.onchange = e=>{

const file = e.target.files[0]
if(!file) return

overlay.src = URL.createObjectURL(file)

base.currentTime = 0
overlay.currentTime = 0

overlay.volume = 0

fade = 0
swap = false

parts = []

recorder = new MediaRecorder(canvas.captureStream(),{mimeType:"video/webm"})
recorder.ondataavailable = e=>{
if(e.data.size>0) parts.push(e.data)
}
recorder.onstop = ()=>{
const file = new Blob(parts,{type:"video/webm"})
const url = URL.createObjectURL(file)
save.style.display="inline"
save.onclick=()=>{
const a=document.createElement("a")
a.href=url
a.download="video.webm"
a.click()
}
}

recorder.start()

base.play().then(()=>{
draw()
})

}

function draw(){

ctx.drawImage(base,0,0,canvas.width,canvas.height)

if(base.currentTime>=2 && !swap){
overlay.play()
swap=true
}

if(swap){
fade+=0.02
overlay.volume=fade
ctx.globalAlpha=fade
ctx.drawImage(overlay,0,0,canvas.width,canvas.height)
ctx.globalAlpha=1
}

if(fade>=1 && overlay.ended){
recorder.stop()
return
}

requestAnimationFrame(draw)

}

</script>

</body>
</html>
