<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>video merge</title>
<style>
body{background:#0f0f0f;font-family:sans-serif;display:flex;align-items:center;justify-content:center;flex-direction:column;height:100vh;margin:0;color:white}
canvas{background:black;max-height:70vh}
video{display:none}
select,input,button{margin-top:14px}
</style>
</head>
<body>

<canvas id="screen"></canvas>

<select id="ratio">
<option value="9:16" selected>9:16</option>
<option value="16:9">16:9</option>
<option value="4:3">4:3</option>
<option value="1:1">1:1</option>
</select>

<input type="file" id="filepick" accept="video/*">
<button id="save" disabled>download mp4</button>

<video id="base" playsinline preload="auto" crossorigin="anonymous"></video>
<video id="overlay" playsinline preload="auto"></video>

<script>
const canvas=document.getElementById("screen")
const ctx=canvas.getContext("2d")
const base=document.getElementById("base")
const overlay=document.getElementById("overlay")
const pick=document.getElementById("filepick")
const save=document.getElementById("save")
const ratio=document.getElementById("ratio")

let fade=0, swap=false, finished=false, webmBlob=null
let recorder, parts=[]
let running=false

function setRatio(r){
let w=1080,h=1920
if(r==="16:9"){w=1920;h=1080}
if(r==="4:3"){w=1440;h=1080}
if(r==="1:1"){w=1080;h=1080}
canvas.width=w
canvas.height=h
}
setRatio("9:16")
ratio.onchange=()=>setRatio(ratio.value)

base.src="https://raw.githubusercontent.com/xyrevex/pullthatvideoup/main/sourcevid.mp4"

let audioCtx=null, dest=null, baseSrc=null, overlaySrc=null

function startRecorder(stream){
parts=[]
let mime="video/mp4"
if(!MediaRecorder.isTypeSupported(mime)) mime="video/webm"
recorder=new MediaRecorder(stream,{mimeType:mime})
recorder.ondataavailable=e=>{if(e.data.size>0)parts.push(e.data)}
recorder.onstop=()=>{
webmBlob=new Blob(parts,{type:recorder.mimeType})
finished=true
save.disabled=false
save.textContent="download mp4"
}
recorder.start()
save.disabled=true
save.textContent="recording..."
}

pick.onchange=e=>{
const file=e.target.files[0]
if(!file)return

overlay.src=URL.createObjectURL(file)
overlay.volume=0

fade=0
swap=false
finished=false
running=true

base.currentTime=0
overlay.currentTime=0

if(!audioCtx){
audioCtx=new AudioContext()
dest=audioCtx.createMediaStreamDestination()
baseSrc=audioCtx.createMediaElementSource(base)
overlaySrc=audioCtx.createMediaElementSource(overlay)
baseSrc.connect(dest)
overlaySrc.connect(dest)
}

const canvasStream=canvas.captureStream(60)
const combinedStream=new MediaStream([
...canvasStream.getVideoTracks(),
...dest.stream.getAudioTracks()
])

startRecorder(combinedStream)

base.play().then(()=>{
overlay.pause()
renderLoop()
})
}

function renderLoop(){
if(!running) return

ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.drawImage(base,0,0,canvas.width,canvas.height)

if(base.currentTime>=1.5 && !swap){
overlay.play()
swap=true
}

if(swap){
fade+=0.02
if(fade>1)fade=1
overlay.volume=fade

ctx.globalAlpha=fade
ctx.drawImage(overlay,0,0,canvas.width,canvas.height)
ctx.globalAlpha=1
}

if(overlay.ended){
running=false
recorder.stop()
return
}

setTimeout(renderLoop,1000/60)
}

save.onclick=()=>{
if(!finished||!webmBlob)return
const url=URL.createObjectURL(webmBlob)
const a=document.createElement("a")
a.href=url
a.download="video.mp4"
a.click()
}
</script>

</body>
</html>
