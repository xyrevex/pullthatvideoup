<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>video</title>

<style>
body{
background:#0f0f0f;
font-family:sans-serif;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
height:100vh;
margin:0;
color:white
}

#frame{
position:relative;
width:720px;
height:405px;
background:black;
overflow:hidden
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover
}

#overlay{
opacity:0
}

input{
margin-top:20px
}
</style>

</head>

<body>

<div id="frame">
<video id="base" playsinline preload="auto"></video>
<video id="overlay" muted playsinline></video>
</div>

<input type="file" id="filepick" accept="video/*">

<script>

const base = document.getElementById("base")
const overlay = document.getElementById("overlay")
const pick = document.getElementById("filepick")

base.src = "https://raw.githubusercontent.com/xyrevex/pullthatvideoup/main/sourcevid.mp4"

pick.onchange = e => {

const file = e.target.files[0]
if(!file) return

overlay.src = URL.createObjectURL(file)
overlay.muted = true

base.currentTime = 0
overlay.currentTime = 0

base.play().then(()=>{
watch()
})

}

function watch(){

const timer = setInterval(()=>{

if(base.currentTime >= 2.30){

clearInterval(timer)

overlay.play()
blend()

}

},30)

}

function blend(){

let t = 0

const f = setInterval(()=>{

t += 0.05

base.style.opacity = 1 - t
overlay.style.opacity = t

if(t >= 1){
clearInterval(f)
base.pause()
}

},30)

}

</script>

</body>
</html>
