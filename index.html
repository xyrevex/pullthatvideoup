<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>video</title>

<style>
body{
background:#0f0f0f;
font-family:sans-serif;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
height:100vh;
margin:0;
color:white
}

canvas{
background:black;
max-height:70vh
}

video{
display:none
}

select,input,button{
margin-top:14px
}

#barwrap{
width:260px;
height:12px;
background:#222;
margin-top:14px;
border-radius:6px;
overflow:hidden
}

#bar{
height:100%;
width:0%;
background:#7c6cff
}

#status{
font-size:13px;
opacity:.8;
margin-top:6px
}
</style>

</head>

<body>

<canvas id="screen"></canvas>

<select id="ratio">
<option value="9:16" selected>9:16</option>
<option value="16:9">16:9</option>
<option value="4:3">4:3</option>
<option value="1:1">1:1</option>
</select>

<input type="file" id="filepick" accept="video/*">
<button id="save">download mp4</button>

<div id="barwrap">
<div id="bar"></div>
</div>

<div id="status">idle</div>

<video id="base" playsinline preload="auto"></video> <video id="overlay" playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

<script>

const canvas=document.getElementById("screen")
const ctx=canvas.getContext("2d")

const base=document.getElementById("base")
const overlay=document.getElementById("overlay")

const pick=document.getElementById("filepick")
const save=document.getElementById("save")
const ratio=document.getElementById("ratio")

const bar=document.getElementById("bar")
const status=document.getElementById("status")

base.src="https://raw.githubusercontent.com/xyrevex/pullthatvideoup/main/sourcevid.mp4"

let fade=0
let swap=false

let recorder
let parts=[]
let webmBlob=null

function setRatio(r){

let w=1080
let h=1920

if(r==="16:9"){w=1920;h=1080}
if(r==="4:3"){w=1440;h=1080}
if(r==="1:1"){w=1080;h=1080}

canvas.width=w
canvas.height=h

}

setRatio("9:16")

ratio.onchange=()=>setRatio(ratio.value)

function startRecorder(){

parts=[]

recorder=new MediaRecorder(canvas.captureStream(),{mimeType:"video/webm"})

recorder.ondataavailable=e=>{
if(e.data.size>0)parts.push(e.data)
}

recorder.onstop=()=>{
webmBlob=new Blob(parts,{type:"video/webm"})
status.textContent="ready"
}

recorder.start()

}

pick.onchange=e=>{

const file=e.target.files[0]
if(!file)return

overlay.src=URL.createObjectURL(file)

overlay.volume=0

fade=0
swap=false

base.currentTime=0
overlay.currentTime=0

status.textContent="rendering preview"

startRecorder()

base.play().then(()=>{
overlay.pause()
loop()
})

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(base,0,0,canvas.width,canvas.height)

if(base.currentTime>=1.8 && !swap){
overlay.play()
swap=true
}

if(swap){

fade+=0.02
if(fade>1)fade=1

overlay.volume=fade

ctx.globalAlpha=fade
ctx.drawImage(overlay,0,0,canvas.width,canvas.height)
ctx.globalAlpha=1

}

if(overlay.ended){
recorder.stop()
return
}

requestAnimationFrame(loop)

}

save.onclick=async()=>{

if(!webmBlob)return

status.textContent="loading encoder"
bar.style.width="0%"

const {createFFmpeg,fetchFile}=FFmpeg

const ffmpeg=createFFmpeg({
log:false,
progress:p=>{
let percent=Math.floor(p.ratio*100)
bar.style.width=percent+"%"
status.textContent="encoding "+percent+"%"
}
})

await ffmpeg.load()

status.textContent="preparing"

ffmpeg.FS("writeFile","input.webm",await fetchFile(webmBlob))

await ffmpeg.run(
"-i","input.webm",
"-c:v","libx264",
"-pix_fmt","yuv420p",
"output.mp4"
)

const data=ffmpeg.FS("readFile","output.mp4")

const url=URL.createObjectURL(new Blob([data.buffer],{type:"video/mp4"}))

status.textContent="download ready"

const a=document.createElement("a")
a.href=url
a.download="video.mp4"
a.click()

}

</script>

</body>
</html>
