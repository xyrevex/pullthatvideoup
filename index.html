<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>video</title>

<style>
body{
background:#0f0f0f;
font-family:sans-serif;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
height:100vh;
margin:0;
color:white
}

#frame{
position:relative;
width:720px;
height:405px;
background:black;
overflow:hidden
}

video{
display:none
}

canvas{
width:720px;
height:405px;
background:black
}

input,button{
margin-top:16px
}

#save{
display:none
}
</style>

</head>

<body>

<canvas id="screen" width="1280" height="720"></canvas>

<video id="base" playsinline preload="auto"></video> <video id="overlay" playsinline></video>

<input type="file" id="filepick" accept="video/*">
<button id="save">download</button>

<script>

const base = document.getElementById("base")
const overlay = document.getElementById("overlay")
const pick = document.getElementById("filepick")
const canvas = document.getElementById("screen")
const ctx = canvas.getContext("2d")
const save = document.getElementById("save")

base.src = "https://raw.githubusercontent.com/xyrevex/pullthatvideoup/main/sourcevid.mp4"

let fade = 0
let swap = false

let stream = canvas.captureStream()
let recorder = new MediaRecorder(stream,{mimeType:"video/webm"})
let parts = []

recorder.ondataavailable = e=>{
if(e.data.size>0) parts.push(e.data)
}

recorder.onstop = ()=>{
const file = new Blob(parts,{type:"video/webm"})
const url = URL.createObjectURL(file)
save.style.display="inline"
save.onclick=()=>{
const a=document.createElement("a")
a.href=url
a.download="video.webm"
a.click()
}
}

pick.onchange = e=>{

const file = e.target.files[0]
if(!file) return

overlay.src = URL.createObjectURL(file)

base.currentTime = 0
overlay.currentTime = 0

overlay.volume = 0

parts = []
recorder.start()

base.play().then(()=>{
render()
})

}

function render(){

ctx.drawImage(base,0,0,canvas.width,canvas.height)

if(base.currentTime>=2 && !swap){
overlay.play()
swap=true
}

if(swap){
fade+=0.02
overlay.volume=fade
ctx.globalAlpha=fade
ctx.drawImage(overlay,0,0,canvas.width,canvas.height)
ctx.globalAlpha=1
}

if(fade>=1 && overlay.ended){
recorder.stop()
return
}

requestAnimationFrame(render)

}

</script>

</body>
</html>
