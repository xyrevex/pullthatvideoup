<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>video merge</title>
<style>
body{background:#0f0f0f;font-family:sans-serif;display:flex;align-items:center;justify-content:center;flex-direction:column;height:100vh;margin:0;color:white}
canvas{background:black;max-height:70vh}
video{display:none}
select,input,button{margin-top:14px}
progress{width:320px;margin-top:10px}
</style>
</head>
<body>

<canvas id="screen"></canvas>

<select id="ratio">
<option value="9:16" selected>9:16</option>
<option value="16:9">16:9</option>
<option value="4:3">4:3</option>
<option value="1:1">1:1</option>
</select>

<input type="file" id="filepick" accept="video/*">

<button id="save" disabled>download mp4</button>

<progress id="bar" value="0" max="1"></progress>

<video id="base" playsinline preload="auto" crossorigin="anonymous"></video> <video id="overlay" playsinline preload="auto"></video>

<script>

const canvas=document.getElementById("screen")
const ctx=canvas.getContext("2d")

const base=document.getElementById("base")
const overlay=document.getElementById("overlay")

const pick=document.getElementById("filepick")
const save=document.getElementById("save")
const ratio=document.getElementById("ratio")
const bar=document.getElementById("bar")

let fade=0
let swap=false
let finished=false

let recorder
let parts=[]
let blob=null

let audioCtx
let dest
let baseSrc
let overlaySrc

base.src="https://raw.githubusercontent.com/xyrevex/pullthatvideoup/main/sourcevid.mp4"

function setRatio(r){
let w=1080
let h=1920
if(r==="16:9"){w=1920;h=1080}
if(r==="4:3"){w=1440;h=1080}
if(r==="1:1"){w=1080;h=1080}
canvas.width=w
canvas.height=h
}

setRatio("9:16")
ratio.onchange=()=>setRatio(ratio.value)

function startRecorder(stream){

parts=[]

let type="video/mp4"
if(!MediaRecorder.isTypeSupported(type)) type="video/webm"

recorder=new MediaRecorder(stream,{mimeType:type})

recorder.ondataavailable=e=>{
if(e.data.size>0) parts.push(e.data)
}

recorder.onstop=()=>{
blob=new Blob(parts,{type:recorder.mimeType})
finished=true
save.disabled=false
save.textContent="download mp4"
}

recorder.start()

save.disabled=true
save.textContent="rendering"

}

pick.onchange=e=>{

const file=e.target.files[0]
if(!file) return

overlay.src=URL.createObjectURL(file)

fade=0
swap=false
finished=false

base.currentTime=0
overlay.currentTime=0

if(!audioCtx){

audioCtx=new AudioContext()
dest=audioCtx.createMediaStreamDestination()

baseSrc=audioCtx.createMediaElementSource(base)
overlaySrc=audioCtx.createMediaElementSource(overlay)

baseSrc.connect(dest)
overlaySrc.connect(dest)

}

const canvasStream=canvas.captureStream()

const combined=new MediaStream([
...canvasStream.getVideoTracks(),
...dest.stream.getAudioTracks()
])

startRecorder(combined)

base.play()

renderLoop()

}

function renderLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(!swap){
ctx.drawImage(base,0,0,canvas.width,canvas.height)
}

if(base.currentTime>=1.5 && !swap){
overlay.play()
swap=true
}

if(swap){

fade+=0.02
if(fade>1) fade=1

if(fade<1){

ctx.drawImage(base,0,0,canvas.width,canvas.height)

ctx.globalAlpha=fade
ctx.drawImage(overlay,0,0,canvas.width,canvas.height)
ctx.globalAlpha=1

}else{

ctx.drawImage(overlay,0,0,canvas.width,canvas.height)

}

overlay.volume=fade
bar.value=fade

}

if(overlay.ended){
recorder.stop()
return
}

requestAnimationFrame(renderLoop)

}

save.onclick=()=>{

if(!finished || !blob) return

const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="video.mp4"
a.click()

}

</script>

</body>
</html>
